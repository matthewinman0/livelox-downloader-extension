<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" type="text/css" href="style.css">
        <script src="./jszip.min.js"></script>
        <script src="../src/utils.js"></script>
        <script src="../src/api.js"></script>
        <script src="../src/download.js"></script>
        <script src="../src/popup.js"></script>
        <title>Livelox Map Downloader</title>
    </head>
    <body>
        <div class="container">
            <h1>Livelox Downloader</h1>
            
            <div id="log">Ready</div>
            
            <div class="download-options">
                <label><input type="radio" name="downloadType" value="zip" checked> Download ZIP</label>
                <label><input type="radio" name="downloadType" value="png"> Download Map PNG</label>
                <label><input type="radio" name="downloadType" value="iofxml"> Download IOF XML</label>
                <label><input type="radio" name="downloadType" value="json"> Download JSON</label>
                <label><input type="radio" name="downloadType" value="routes"> Download Routes (EXPERIMENTAL)</label>
            </div>
            
            <button id="mapDownload">Download</button>
        </div>
    </body>
</html>
